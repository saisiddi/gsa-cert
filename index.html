<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Certificate Generator</title>
    <style>
      @font-face {
        font-family: "Google Sans Bold";
        src: url("GoogleSans-Bold.ttf") format("truetype");
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }

      :root {
        --blue-900: #0c2a5a;
        --blue-700: #1f5fbf;
        --blue-500: #4285f4;
        --blue-300: #8ab4f8;
        --white: #ffffff;
        --glass: rgba(255, 255, 255, 0.55);
        --glass-border: rgba(255, 255, 255, 0.35);
        --shadow: rgba(18, 61, 140, 0.18);
        --google-red: #ea4335;
        --google-yellow: #fbbc05;
        --google-green: #34a853;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Google Sans Bold", "Segoe UI", sans-serif;
        color: var(--blue-900);
        background:
          radial-gradient(circle at top left, #e8f0fe 0%, transparent 52%),
          radial-gradient(circle at 70% 20%, #d2e3fc 0%, transparent 45%),
          linear-gradient(135deg, #f8fbff 0%, #dbe9ff 55%, #c6dcff 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 18px 50px;
        position: relative;
        overflow-x: hidden;
      }

      .glow-orb {
        position: absolute;
        width: 240px;
        height: 240px;
        border-radius: 50%;
        filter: blur(2px);
        opacity: 0.25;
        pointer-events: none;
      }

      .glow-orb.orb-1 {
        background: radial-gradient(circle, var(--blue-300), transparent 70%);
        top: -60px;
        left: -80px;
      }

      .glow-orb.orb-2 {
        background: radial-gradient(circle, #d7f0ff, transparent 70%);
        bottom: -80px;
        right: -60px;
      }

      .container {
        width: min(980px, 100%);
        display: grid;
        gap: 24px;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        align-items: start;
        z-index: 1;
      }

      .panel {
        background: var(--glass);
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        padding: 28px;
        -webkit-backdrop-filter: blur(18px);
        backdrop-filter: blur(18px);
        box-shadow: 0 30px 60px var(--shadow);
      }

      .brand-pill {
        display: inline-flex;
        gap: 8px;
        padding: 8px 14px;
        border-radius: 999px;
        font-size: 0.72rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        background: rgba(255, 255, 255, 0.7);
        color: var(--blue-700);
        border: 1px solid rgba(66, 133, 244, 0.3);
      }

      .logo {
        width: clamp(120px, 26vw, 180px);
        height: auto;
        display: block;
        margin-bottom: 14px;
      }

      .title {
        margin: 18px 0 12px;
        font-size: clamp(1.8rem, 2.4vw, 2.6rem);
        color: var(--blue-900);
      }

      .subtitle {
        margin: 0 0 22px;
        line-height: 1.6;
        font-size: 0.98rem;
        color: #22447b;
        font-family: "Segoe UI", sans-serif;
      }

      .form-grid {
        display: grid;
        gap: 14px;
      }

      label {
        font-size: 0.75rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #4163a8;
        margin-bottom: 6px;
        display: block;
      }

      input {
        width: 100%;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid rgba(66, 133, 244, 0.3);
        background: rgba(255, 255, 255, 0.8);
        font-size: 1rem;
        color: var(--blue-900);
        font-family: "Google Sans Bold", "Segoe UI", sans-serif;
        transition:
          border 0.2s ease,
          box-shadow 0.2s ease;
      }

      input::placeholder {
        color: #6a8ac7;
        font-family: "Segoe UI", sans-serif;
      }

      input:focus {
        outline: none;
        border-color: var(--blue-500);
        box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.2);
      }

      .btn {
        border: none;
        border-radius: 14px;
        padding: 12px 18px;
        font-size: 1rem;
        cursor: pointer;
        font-weight: 700;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .btn-primary {
        background: linear-gradient(120deg, var(--blue-500), #66a3ff);
        color: var(--white);
        box-shadow: 0 14px 26px rgba(66, 133, 244, 0.32);
      }

      .btn-primary:hover {
        transform: translateY(-1px) scale(1.01);
        box-shadow: 0 18px 34px rgba(66, 133, 244, 0.4);
      }

      .btn-secondary {
        background: rgba(255, 255, 255, 0.85);
        color: var(--blue-700);
        border: 1px solid rgba(66, 133, 244, 0.3);
      }

      .btn-link {
        background: none;
        border: none;
        color: var(--blue-700);
        font-size: 0.85rem;
        cursor: pointer;
      }

      .error {
        display: none;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(234, 67, 53, 0.12);
        border: 1px solid rgba(234, 67, 53, 0.25);
        color: #b3261e;
        font-size: 0.9rem;
        font-family: "Segoe UI", sans-serif;
      }

      .preview-area {
        display: none;
        flex-direction: column;
        gap: 14px;
        margin-top: 18px;
      }

      .preview-img {
        width: 100%;
        border-radius: 16px;
        border: 1px solid rgba(66, 133, 244, 0.25);
        box-shadow: 0 22px 40px rgba(15, 67, 165, 0.25);
      }

      .screen {
        display: none;
        opacity: 0;
        transform: translateY(12px);
        transition:
          opacity 0.35s ease,
          transform 0.35s ease;
      }

      .screen.active {
        display: block;
        opacity: 1;
        transform: translateY(0);
      }

      .admin-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }

      .admin-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        color: var(--blue-700);
      }

      .title-tight {
        margin: 6px 0 0;
      }

      .center-actions {
        margin-top: 18px;
        text-align: center;
      }

      .hidden-canvas {
        display: none;
      }

      .color-line {
        height: 6px;
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          var(--google-blue, #4285f4),
          var(--google-red),
          var(--google-yellow),
          var(--google-green)
        );
        margin: 18px 0;
      }

      @media (max-width: 720px) {
        .panel {
          padding: 22px;
        }
      }
    </style>
  </head>
  <body>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <div class="container">
      <section id="studentScreen" class="screen active">
        <div class="panel">
          <img class="logo" src="gsa-logo.png" alt="GSA Logo" />
          <span class="brand-pill">Pitch Night</span>
          <h1 class="title">Generate Your Certificate</h1>
          <p class="subtitle">
            Enter your full name and generate a professional certificate in one
            click.
          </p>

          <div class="color-line"></div>

          <form id="studentForm" class="form-grid">
            <div>
              <label for="studentNameInput">Full Name</label>
              <input
                id="studentNameInput"
                type="text"
                placeholder="Type your name"
                autocomplete="name"
                required
              />
            </div>
            <button type="submit" class="btn btn-primary">
              Generate Certificate
            </button>
          </form>

          <div id="studentPreview" class="preview-area">
            <img id="studentPreviewImg" class="preview-img" alt="Certificate" />
            <button id="studentDownloadBtn" class="btn btn-primary">
              Download Certificate
            </button>
          </div>

          <div class="center-actions">
            <button id="openAdminBtn" class="btn-link" type="button">
              Admin Portal
            </button>
          </div>
        </div>
      </section>

      <section id="adminLoginScreen" class="screen">
        <div class="panel">
          <div class="admin-header">
            <div>
              <div class="admin-badge">Admin Access</div>
              <div class="title title-tight">Admin Portal</div>
            </div>
            <button id="adminBackBtn" class="btn btn-secondary" type="button">
              Back
            </button>
          </div>

          <form id="adminLoginForm" class="form-grid">
            <div>
              <label for="adminUserInput">Username</label>
              <input
                id="adminUserInput"
                type="text"
                placeholder="Enter admin username"
                required
                autocomplete="username"
              />
            </div>
            <div>
              <label for="adminPassInput">Password</label>
              <input
                id="adminPassInput"
                type="password"
                placeholder="Enter password"
                required
                autocomplete="current-password"
              />
            </div>
            <span class="error" id="adminError">
              Invalid username or password.
            </span>
            <button type="submit" class="btn btn-primary">Login</button>
          </form>
        </div>
      </section>

      <section id="adminDashboard" class="screen">
        <div class="panel">
          <div class="admin-header">
            <div>
              <div class="admin-badge">Admin Tools</div>
              <div class="title title-tight">Certificate Desk</div>
            </div>
            <button id="logoutBtn" class="btn btn-secondary">Logout</button>
          </div>

          <form id="adminForm" class="form-grid">
            <div>
              <label for="adminNameInput">Full Name</label>
              <input
                id="adminNameInput"
                type="text"
                placeholder="Enter recipient name"
                autocomplete="name"
                required
              />
            </div>
            <button id="adminGenerateBtn" class="btn btn-primary" type="submit">
              Generate Certificate
            </button>
          </form>

          <div id="adminPreview" class="preview-area">
            <img id="adminPreviewImg" class="preview-img" alt="Certificate" />
            <button id="adminDownloadBtn" class="btn btn-primary">
              Download Certificate
            </button>
          </div>
        </div>
      </section>
    </div>

    <canvas id="certCanvas" class="hidden-canvas"></canvas>

    <script>
      const CERT_IMAGE_PATH = "Certs/Cert.jpg";
      const ADMIN_USER = "birdscanfly";
      const ADMIN_PASS = "drugsaregood";

      const NAME_CONFIG = {
        xPercent: 50,
        yPercent: 49.0,
        fontSize: 700,
        fontColor: "#1c1c1c",
        maxWidthPercent: 0.68,
        fontFamily: "Google Sans Bold",
      };

      const studentScreen = document.getElementById("studentScreen");
      const adminLoginScreen = document.getElementById("adminLoginScreen");
      const adminDashboard = document.getElementById("adminDashboard");

      const studentForm = document.getElementById("studentForm");
      const studentNameInput = document.getElementById("studentNameInput");
      const studentPreview = document.getElementById("studentPreview");
      const studentPreviewImg = document.getElementById("studentPreviewImg");
      const studentDownloadBtn = document.getElementById("studentDownloadBtn");
      const openAdminBtn = document.getElementById("openAdminBtn");

      const adminLoginForm = document.getElementById("adminLoginForm");
      const adminUserInput = document.getElementById("adminUserInput");
      const adminPassInput = document.getElementById("adminPassInput");
      const adminError = document.getElementById("adminError");
      const adminBackBtn = document.getElementById("adminBackBtn");

      const adminForm = document.getElementById("adminForm");
      const adminNameInput = document.getElementById("adminNameInput");
      const adminPreview = document.getElementById("adminPreview");
      const adminPreviewImg = document.getElementById("adminPreviewImg");
      const adminDownloadBtn = document.getElementById("adminDownloadBtn");
      const logoutBtn = document.getElementById("logoutBtn");

      const certCanvas = document.getElementById("certCanvas");

      let studentDownloadUrl = "";
      let adminDownloadUrl = "";

      function showScreen(screen) {
        [studentScreen, adminLoginScreen, adminDashboard].forEach((el) => {
          el.classList.remove("active");
        });
        screen.classList.add("active");
      }

      function sanitizeFilename(value) {
        return value.trim().replace(/[^a-zA-Z0-9]+/g, "_");
      }

      function resetPreview(preview, previewImg) {
        preview.style.display = "none";
        previewImg.src = "";
      }

      async function renderCertificate({ name, previewImg, onRendered }) {
        const img = new Image();
        img.src = encodeURI(CERT_IMAGE_PATH);
        await img.decode();
        await document.fonts.load(
          `${NAME_CONFIG.fontSize}px "${NAME_CONFIG.fontFamily}"`,
        );

        certCanvas.width = img.naturalWidth;
        certCanvas.height = img.naturalHeight;

        const ctx = certCanvas.getContext("2d");
        ctx.clearRect(0, 0, certCanvas.width, certCanvas.height);
        ctx.drawImage(img, 0, 0, certCanvas.width, certCanvas.height);

        const x = (NAME_CONFIG.xPercent / 100) * certCanvas.width;
        const y = (NAME_CONFIG.yPercent / 100) * certCanvas.height;
        ctx.fillStyle = NAME_CONFIG.fontColor;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        const maxWidth = certCanvas.width * NAME_CONFIG.maxWidthPercent;
        let fontSize = NAME_CONFIG.fontSize;
        ctx.font = `${fontSize}px "${NAME_CONFIG.fontFamily}"`;
        const textWidth = ctx.measureText(name).width;
        if (textWidth > maxWidth) {
          const scaleFactor = maxWidth / textWidth;
          fontSize = Math.floor(fontSize * scaleFactor);
          ctx.font = `${fontSize}px "${NAME_CONFIG.fontFamily}"`;
        }

        ctx.fillText(name, x, y);
        const dataUrl = certCanvas.toDataURL("image/jpeg", 0.95);
        previewImg.src = dataUrl;
        onRendered(dataUrl);
      }

      studentForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        resetPreview(studentPreview, studentPreviewImg);
        const name = studentNameInput.value.trim();
        if (!name) return;

        await renderCertificate({
          name,
          previewImg: studentPreviewImg,
          onRendered: (dataUrl) => {
            studentDownloadUrl = dataUrl;
            studentPreview.style.display = "flex";
          },
        });
      });

      studentDownloadBtn.addEventListener("click", () => {
        if (!studentDownloadUrl) return;
        const name = sanitizeFilename(studentNameInput.value);
        const link = document.createElement("a");
        link.href = studentDownloadUrl;
        link.download = `${name}_Certificate.jpg`;
        link.click();
      });

      openAdminBtn.addEventListener("click", () => {
        adminLoginForm.reset();
        adminError.style.display = "none";
        showScreen(adminLoginScreen);
      });

      adminBackBtn.addEventListener("click", () => {
        showScreen(studentScreen);
      });

      adminLoginForm.addEventListener("submit", (event) => {
        event.preventDefault();
        adminError.style.display = "none";
        const username = adminUserInput.value.trim();
        const password = adminPassInput.value;
        if (username !== ADMIN_USER || password !== ADMIN_PASS) {
          adminError.style.display = "block";
          return;
        }
        adminLoginForm.reset();
        showScreen(adminDashboard);
      });

      adminForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        resetPreview(adminPreview, adminPreviewImg);
        const name = adminNameInput.value.trim();
        if (!name) return;

        await renderCertificate({
          name,
          previewImg: adminPreviewImg,
          onRendered: (dataUrl) => {
            adminDownloadUrl = dataUrl;
            adminPreview.style.display = "flex";
          },
        });
      });

      adminDownloadBtn.addEventListener("click", () => {
        if (!adminDownloadUrl) return;
        const name = sanitizeFilename(adminNameInput.value);
        const link = document.createElement("a");
        link.href = adminDownloadUrl;
        link.download = `${name}_Certificate.jpg`;
        link.click();
      });

      logoutBtn.addEventListener("click", () => {
        adminNameInput.value = "";
        adminDownloadUrl = "";
        resetPreview(adminPreview, adminPreviewImg);
        showScreen(studentScreen);
      });
    </script>
  </body>
</html>
